services:

  postgres:
    image: postgres:17
    container_name: ecommerce_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ecommerce_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  spark:
    image: apache/spark:4.0.2-scala2.13-java17-python3-ubuntu
    container_name: ecommerce_spark
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - ./spark_jobs:/app/spark_jobs
      - ./data:/app/data
    ports:
      - "4040:4040"
    command: tail -f /dev/null

  airflow:
    image: apache/airflow:2.9.1-python3.10
    container_name: ecommerce_airflow
    restart: always
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
      airflow webserver & airflow scheduler"

  metabase:
    image: metabase/metabase
    container_name: ecommerce_metabase
    ports:
      - "3000:3000"

volumes:
  postgres_data: