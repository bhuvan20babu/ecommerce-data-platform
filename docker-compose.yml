services:

  postgres:
    image: postgres:14
    container_name: ecommerce_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ecommerce_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  spark:
    image: apache/spark:4.0.2-scala2.13-java17-python3-ubuntu
    container_name: ecommerce_spark
    volumes:
      - .:/app
    ports:
      - "4040:4040"
    command: tail -f /dev/null

volumes:
  postgres_data: